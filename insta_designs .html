<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>TAK ビフォーアフター A/C デザイン v3</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Hiragino Kaku Gothic ProN','Meiryo',sans-serif;background:#e0e0e0;padding:14px;}
h1{font-size:13px;font-weight:700;text-align:center;margin-bottom:10px;color:#1a1a1a;}

/* タブ共通 */
.tabs{display:flex;gap:6px;justify-content:center;margin-bottom:8px;}
.tab{padding:6px 16px;border-radius:20px;font-size:11px;cursor:pointer;border:1.5px solid #bbb;background:#fff;font-family:inherit;font-weight:700;}
.tab.on{background:#111;color:#fff;border-color:#111;}

/* デザインタブ */
.design-tabs{display:flex;gap:6px;justify-content:center;margin-bottom:0;}
.dtab{flex:1;max-width:160px;padding:7px 10px;border-radius:8px 8px 0 0;font-size:11px;cursor:pointer;border:none;font-family:inherit;font-weight:700;transition:opacity .15s;}

/* ===== DESIGN A ===== */
#panel-a{background:#0a1628;border-radius:0 0 12px 12px;padding:14px;display:flex;flex-direction:column;gap:10px;}
.a-header{display:flex;justify-content:space-between;align-items:center;}
.a-clinic{font-size:11px;font-weight:800;color:#c8f5a0;letter-spacing:.12em;}
.a-sub{font-size:9px;color:#444;}
.a-row{display:flex;gap:5px;}
.a-col{flex:1;display:flex;flex-direction:column;}
.a-imgbox{border-radius:8px;overflow:hidden;position:relative;cursor:crosshair;}
.a-imgbox img{width:100%;display:block;}
.a-imgbox canvas{position:absolute;top:0;left:0;pointer-events:none;z-index:5;}
.a-badge{text-align:center;padding:5px 0;font-size:10px;font-weight:800;letter-spacing:.08em;}
.a-bb{background:rgba(0,0,0,.85);color:#c8f5a0;}
.a-ba{background:#c8f5a0;color:#0a1628;}
.a-divider{width:2px;background:#c8f5a0;flex-shrink:0;border-radius:1px;}
.a-tags{display:flex;gap:5px;flex-wrap:wrap;}
.a-tag{background:#112240;border-radius:20px;padding:3px 9px;font-size:9px;color:#c8f5a0;font-weight:700;}
.a-foot{display:flex;justify-content:space-between;border-top:1px solid #162d4e;padding-top:6px;}
.a-foot span{font-size:8px;color:#444;}

/* ===== DESIGN C ===== */
#panel-c{display:none;background:#f8f6ff;border:1px solid #ddd5ff;border-top:none;border-radius:0 0 12px 12px;padding:14px;display:none;flex-direction:column;gap:8px;}
.c-brand{font-size:9px;font-weight:800;color:#7c3aed;letter-spacing:.18em;}
.c-subt{font-size:7px;color:#bbb;letter-spacing:.05em;}
.c-hr{height:1px;background:#e0d8ff;margin:3px 0;}
.c-imgs{display:flex;flex-direction:column;gap:5px;}
.c-imgwrap{position:relative;border-radius:8px;overflow:hidden;cursor:crosshair;}
.c-imgwrap img{width:100%;display:block;}
.c-imgwrap canvas{position:absolute;top:0;left:0;pointer-events:none;z-index:5;}
.c-badge{position:absolute;top:6px;left:6px;font-size:9px;font-weight:800;padding:2px 8px;border-radius:4px;}
.c-bb{background:#7c3aed;color:#fff;}
.c-ba{background:#fbbf24;color:#1a0a00;}
.c-change{text-align:center;font-size:9px;color:#7c3aed;font-weight:700;letter-spacing:.1em;}
.c-foot{border-top:1px solid #e0d8ff;padding-top:7px;display:flex;}
.c-fp{flex:1;font-size:8px;color:#7c3aed;font-weight:700;text-align:center;line-height:1.6;border-right:1px solid #e0d8ff;}
.c-fp:last-child{border-right:none;}

/* ===== コントロールパネル ===== */
.ctrl-panel{background:#fff;border-radius:10px;padding:12px;margin-top:10px;display:flex;flex-direction:column;gap:10px;}
.ctrl-title{font-size:11px;font-weight:700;color:#1a1a1a;}
.ctrl-section{background:#f5f5f5;border-radius:8px;padding:10px;display:flex;flex-direction:column;gap:7px;}
.ctrl-section-title{font-size:10px;font-weight:700;color:#555;}
.ctrl-row{display:flex;align-items:center;gap:8px;}
.ctrl-label{font-size:10px;color:#666;width:56px;flex-shrink:0;}
.ctrl-row input[type=range]{flex:1;height:4px;accent-color:#2e7d52;}
.ctrl-val{font-size:10px;font-weight:700;color:#1a1a1a;width:36px;text-align:right;flex-shrink:0;}

/* ぼかし種別ボタン */
.blur-types{display:flex;gap:6px;}
.btype{flex:1;padding:7px 8px;border-radius:8px;border:2px solid #ddd;background:#f5f5f5;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;text-align:center;transition:all .15s;}
.btype.on{border-color:#0a1628;background:#0a1628;color:#c8f5a0;}

/* 対象選択 */
.face-target{display:flex;gap:5px;}
.ftarget{flex:1;padding:5px;border-radius:6px;border:1.5px solid #ddd;background:#f5f5f5;font-size:10px;font-weight:700;cursor:pointer;font-family:inherit;text-align:center;}
.ftarget.on{border-color:#1565c0;background:#e3f2fd;color:#1565c0;}

.hint{font-size:9px;color:#999;text-align:center;margin-top:2px;}
</style>
</head>
<body>
<h1>ビフォーアフター デザイン A / C</h1>

<!-- デザイン切替 -->
<div class="design-tabs">
  <button class="dtab on" id="dt-a" onclick="showDesign('a')" style="background:#0a1628;color:#c8f5a0;opacity:1">A — モノトーン</button>
  <button class="dtab" id="dt-c" onclick="showDesign('c')" style="background:#7c3aed;color:#fff;opacity:.45">C — エディトリアル</button>
</div>

<!-- DESIGN A -->
<div id="panel-a">
  <div class="a-header">
    <span class="a-clinic">整体院 TAK</span>
    <span class="a-sub">施術後の変化</span>
  </div>
  <div class="a-row">
    <div class="a-col">
      <div class="a-imgbox" id="a-bwrap" onclick="onImgClick(event,'before')">
        <img id="a-bi" src="" alt="">
        <canvas id="a-bc"></canvas>
      </div>
      <div class="a-badge a-bb">BEFORE</div>
    </div>
    <div class="a-divider"></div>
    <div class="a-col">
      <div class="a-imgbox" id="a-awrap" onclick="onImgClick(event,'after')">
        <img id="a-ai" src="" alt="">
        <canvas id="a-ac"></canvas>
      </div>
      <div class="a-badge a-ba">AFTER</div>
    </div>
  </div>
  <div class="a-tags">
    <span class="a-tag" id="a-t1">✓ 姿勢改善</span>
    <span class="a-tag" id="a-t2">✓ 肩甲骨整列</span>
    <span class="a-tag" id="a-t3">✓ 頭部前方位改善</span>
  </div>
  <div class="a-foot">
    <span>@seitai_tak</span>
    <span>#整体 #腰痛 #坐骨神経痛 #姿勢改善 #袋井</span>
  </div>
</div>

<!-- DESIGN C -->
<div id="panel-c" style="display:none">
  <div class="c-brand">整体院 TAK</div>
  <div class="c-subt">BODY TRANSFORMATION</div>
  <div class="c-hr"></div>
  <div class="c-imgs">
    <div class="c-imgwrap" onclick="onImgClick(event,'before')">
      <img id="c-bi" src="" alt="">
      <canvas id="c-bc"></canvas>
      <div class="c-badge c-bb">BEFORE</div>
    </div>
    <div class="c-change">▼ CHANGE</div>
    <div class="c-imgwrap" onclick="onImgClick(event,'after')">
      <img id="c-ai" src="" alt="">
      <canvas id="c-ac"></canvas>
      <div class="c-badge c-ba">AFTER</div>
    </div>
  </div>
  <div class="c-foot">
    <div class="c-fp" id="c-f1">姿勢<br>改善</div>
    <div class="c-fp" id="c-f2">肩甲骨<br>整列</div>
    <div class="c-fp" id="c-f3">可動域<br>拡大</div>
  </div>
</div>

<!-- サンプル切替 -->
<div class="tabs" style="margin-top:10px">
  <button class="tab on" id="s-male" onclick="setSample('male')">① 男性</button>
  <button class="tab" id="s-female" onclick="setSample('female')">② 女性</button>
</div>

<!-- コントロールパネル -->
<div class="ctrl-panel">
  <div class="ctrl-title">顔ぼかし設定</div>

  <!-- ぼかし種別 -->
  <div class="ctrl-section">
    <div class="ctrl-section-title">種別</div>
    <div class="blur-types">
      <button class="btype on" id="bt-logo" onclick="setBlur('logo')">院名ロゴ TAK</button>
      <button class="btype" id="bt-smile" onclick="setBlur('smile')">スマイル :)</button>
      <button class="btype" id="bt-both" onclick="setBlur('both')">両方選択可</button>
    </div>
  </div>

  <!-- 調整対象 -->
  <div class="ctrl-section">
    <div class="ctrl-section-title">調整対象</div>
    <div class="face-target">
      <button class="ftarget on" id="ft-before" onclick="setTarget('before')">ビフォー</button>
      <button class="ftarget" id="ft-after" onclick="setTarget('after')">アフター</button>
    </div>
    <div class="hint">画像をタップすると位置が移動します</div>
  </div>

  <!-- 横位置 -->
  <div class="ctrl-section">
    <div class="ctrl-section-title">位置・サイズ調整</div>
    <div class="ctrl-row">
      <span class="ctrl-label">横位置</span>
      <input type="range" id="sl-x" min="10" max="90" value="40" oninput="onSlider()">
      <span class="ctrl-val" id="vl-x">40%</span>
    </div>
    <div class="ctrl-row">
      <span class="ctrl-label">縦位置</span>
      <input type="range" id="sl-y" min="5" max="60" value="36" oninput="onSlider()">
      <span class="ctrl-val" id="vl-y">36%</span>
    </div>
    <div class="ctrl-row">
      <span class="ctrl-label">大きさ</span>
      <input type="range" id="sl-r" min="4" max="22" value="10" oninput="onSlider()">
      <span class="ctrl-val" id="vl-r">10%</span>
    </div>
  </div>

  <!-- アフター別設定 -->
  <div class="ctrl-section" id="after-ctrl">
    <div class="ctrl-section-title">アフター 位置・サイズ</div>
    <div class="ctrl-row">
      <span class="ctrl-label">横位置</span>
      <input type="range" id="sl-ax" min="10" max="90" value="42" oninput="onSlider()">
      <span class="ctrl-val" id="vl-ax">42%</span>
    </div>
    <div class="ctrl-row">
      <span class="ctrl-label">縦位置</span>
      <input type="range" id="sl-ay" min="5" max="60" value="33" oninput="onSlider()">
      <span class="ctrl-val" id="vl-ay">33%</span>
    </div>
    <div class="ctrl-row">
      <span class="ctrl-label">大きさ</span>
      <input type="range" id="sl-ar" min="4" max="22" value="10" oninput="onSlider()">
      <span class="ctrl-val" id="vl-ar">10%</span>
    </div>
  </div>

</div>

  female:{at:['✓ 腰椎過前弯改善','✓ 骨盤前傾改善','✓ 胸椎伸展拡大'],bt:'腰椎過前弯改善',cf:['腰椎過前弯<br>改善','骨盤前傾<br>正常化','胸椎伸展<br>拡大']}
};

var PAIRS=[
  {bi:'a-bi',ai:'a-ai',bc:'a-bc',ac:'a-ac'},
  {bi:'c-bi',ai:'c-ai',bc:'c-bc',ac:'c-ac'}
];

var cur='male', curDesign='a', curTarget='before', globalBlur='logo';
var cache={};

function showDesign(d){
  curDesign=d;
  document.getElementById('panel-a').style.display = d==='a'?'flex':'none';
  document.getElementById('panel-c').style.display = d==='c'?'flex':'none';
  document.getElementById('dt-a').style.opacity = d==='a'?'1':'.45';
  document.getElementById('dt-c').style.opacity = d==='c'?'1':'.45';
  setTimeout(drawAll,50);
}

function setSample(key){
  cur=key;
  document.getElementById('s-male').className='tab'+(key==='male'?' on':'');
  document.getElementById('s-female').className='tab'+(key==='female'?' on':'');
  var L=LABELS[key];
  document.getElementById('a-t1').textContent=L.at[0];
  document.getElementById('a-t2').textContent=L.at[1];
  document.getElementById('a-t3').textContent=L.at[2];
  if(document.getElementById('c-f1')){
    document.getElementById('c-f1').innerHTML=L.cf[0];
    document.getElementById('c-f2').innerHTML=L.cf[1];
    document.getElementById('c-f3').innerHTML=L.cf[2];
  }
  if(cache[key]){applyAll(cache[key].b,cache[key].a);}
  else{
    var img=new Image();
    img.onload=function(){
      var hw=Math.floor(img.width/2),ih=img.height;
      var cb=document.createElement('canvas');cb.width=hw;cb.height=ih;
      cb.getContext('2d').drawImage(img,0,0,hw,ih,0,0,hw,ih);
      var ca=document.createElement('canvas');ca.width=hw;ca.height=ih;
      ca.getContext('2d').drawImage(img,hw,0,hw,ih,0,0,hw,ih);
      cache[key]={b:cb.toDataURL('image/jpeg',.92),a:ca.toDataURL('image/jpeg',.92)};
      applyAll(cache[key].b,cache[key].a);
    };
    img.src=SRC[key];
  }
}

function applyAll(bUrl,aUrl){
  PAIRS.forEach(function(p){
    document.getElementById(p.bi).src=bUrl;
    document.getElementById(p.ai).src=aUrl;
  });
  setTimeout(drawAll,120);
}

function setBlur(type){
  globalBlur=type;
  ['logo','smile','both'].forEach(function(t){
    document.getElementById('bt-'+t).className='btype'+(type===t?' on':'');
  });
  if(type==='both'){
    cfg.before.blur='logo';
    cfg.after.blur='smile';
  } else {
    cfg.before.blur=type;
    cfg.after.blur=type;
  }
  drawAll();
}

function setTarget(t){
  curTarget=t;
  document.getElementById('ft-before').className='ftarget'+(t==='before'?' on':'');
  document.getElementById('ft-after').className='ftarget'+(t==='after'?' on':'');
  // スライダーをそのターゲットの値に同期
  var c = cfg[t];
  if(t==='before'){
    document.getElementById('sl-x').value=c.x;
    document.getElementById('sl-y').value=c.y;
    document.getElementById('sl-r').value=c.r;
  } else {
    document.getElementById('sl-ax').value=c.x;
    document.getElementById('sl-ay').value=c.y;
    document.getElementById('sl-ar').value=c.r;
  }
  updateVals();
}

function onSlider(){
  cfg.before.x = parseInt(document.getElementById('sl-x').value);
  cfg.before.y = parseInt(document.getElementById('sl-y').value);
  cfg.before.r = parseInt(document.getElementById('sl-r').value);
  cfg.after.x  = parseInt(document.getElementById('sl-ax').value);
  cfg.after.y  = parseInt(document.getElementById('sl-ay').value);
  cfg.after.r  = parseInt(document.getElementById('sl-ar').value);
  updateVals();
  drawAll();
}

function updateVals(){
  document.getElementById('vl-x').textContent  = cfg.before.x+'%';
  document.getElementById('vl-y').textContent  = cfg.before.y+'%';
  document.getElementById('vl-r').textContent  = cfg.before.r+'%';
  document.getElementById('vl-ax').textContent = cfg.after.x+'%';
  document.getElementById('vl-ay').textContent = cfg.after.y+'%';
  document.getElementById('vl-ar').textContent = cfg.after.r+'%';
}

// 画像タップで位置移動
function onImgClick(e, side){
  var rect = e.currentTarget.getBoundingClientRect();
  var x = Math.round((e.clientX - rect.left) / rect.width * 100);
  var y = Math.round((e.clientY - rect.top)  / rect.height * 100);
  cfg[side].x = x; cfg[side].y = y;
  if(side==='before'){
    document.getElementById('sl-x').value=x;
    document.getElementById('sl-y').value=y;
    document.getElementById('vl-x').textContent=x+'%';
    document.getElementById('vl-y').textContent=y+'%';
  } else {
    document.getElementById('sl-ax').value=x;
    document.getElementById('sl-ay').value=y;
    document.getElementById('vl-ax').textContent=x+'%';
    document.getElementById('vl-ay').textContent=y+'%';
  }
  drawAll();
}

function drawAll(){
  PAIRS.forEach(function(p){
    drawFace(p.bc, p.bi, cfg.before);
    drawFace(p.ac, p.ai, cfg.after);
  });
}

function drawFace(cvId, imgId, c){
  var cv=document.getElementById(cvId);
  var img=document.getElementById(imgId);
  if(!cv||!img||!img.naturalWidth)return;
  var w=img.offsetWidth,h=img.offsetHeight;
  if(!w||!h)return;
  cv.width=w;cv.height=h;
  cv.style.width=w+'px';cv.style.height=h+'px';
  var cx=c.x/100*w, cy=c.y/100*h, r=c.r/100*Math.min(w,h);
  var ctx=cv.getContext('2d');
  ctx.clearRect(0,0,w,h);
  var type=c.blur||globalBlur;
  if(type==='logo'||type==='both'){
    drawLogo(ctx,cx,cy,r);
  } else {
    drawSmile(ctx,cx,cy,r);
  }
}

function drawLogo(ctx,cx,cy,r){
  ctx.clearRect(cx-r-2, cy-r-2, (r+2)*2, (r+2)*2);
  ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);
  ctx.fillStyle='#0a1628';ctx.fill();
  ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);
  ctx.strokeStyle='#c8f5a0';ctx.lineWidth=Math.max(1.5,r*.1);ctx.stroke();
  ctx.fillStyle='#c8f5a0';
  ctx.font='bold '+(r*.52)+'px "Hiragino Kaku Gothic ProN",sans-serif';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('TAK',cx,cy);
}
function drawSmile(ctx,cx,cy,r){
  ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);
  ctx.fillStyle='#4db8d4';ctx.fill();
  ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);
  ctx.strokeStyle='#e0f7ff';ctx.lineWidth=Math.max(1.5,r*.1);ctx.stroke();
  ctx.fillStyle='#e0f7ff';
  ctx.font='bold '+(r*.55)+'px "Hiragino Kaku Gothic ProN",sans-serif';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(':)',cx,cy);
}

window.addEventListener('resize',function(){setTimeout(drawAll,100);});
setSample('male');
updateVals();
</script>
</body>
</html>
