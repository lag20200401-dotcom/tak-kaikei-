<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>ビフォーアフター 4フォーマット</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Hiragino Kaku Gothic ProN','Meiryo',sans-serif;background:#efefef;padding:16px;}
h1{font-size:16px;font-weight:700;text-align:center;margin-bottom:12px;color:#1a1a1a;}
.tabs{display:flex;gap:8px;justify-content:center;margin-bottom:14px;}
.tab{padding:6px 20px;border-radius:20px;font-size:12px;cursor:pointer;border:1.5px solid #ccc;background:#fff;font-family:inherit;font-weight:600;}
.tab.on{background:#2e7d52;color:#fff;border-color:#2e7d52;}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;max-width:1080px;margin:0 auto;}
.card{background:#fff;border-radius:10px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.1);}
.head{padding:9px 12px;color:#fff;}
.head h2{font-size:12px;font-weight:700;}
.head p{font-size:10px;opacity:.7;margin-top:2px;}
.body{padding:12px;}
.lb{background:#1565c0;color:#fff;}
.la{background:#2e7d52;color:#fff;}
.lbl{display:inline-block;padding:3px 8px;border-radius:4px;font-size:11px;font-weight:700;}
.a-top{display:flex;justify-content:space-between;margin-bottom:6px;}
#a-img{width:100%;border-radius:6px;display:block;}
.b-row{display:flex;gap:0;}
.b-col{flex:1;display:flex;flex-direction:column;}
.b-lbl{text-align:center;padding:4px;font-size:11px;font-weight:700;border-radius:4px;margin-bottom:5px;flex-shrink:0;}
.b-imgwrap{position:relative;overflow:hidden;flex:1;border-radius:5px;}
.b-imgwrap img{width:100%;display:block;}
.gl{position:absolute;left:0;right:0;height:2px;pointer-events:none;z-index:5;}
.gl-tag{position:absolute;right:4px;font-size:9px;font-weight:700;padding:1px 4px;border-radius:3px;z-index:6;transform:translateY(-50%);white-space:nowrap;}
.b-mid{width:3px;background:#2e7d52;flex-shrink:0;margin-top:30px;border-radius:2px;}
.b-legend{display:flex;gap:12px;margin-top:8px;}
.b-li{display:flex;align-items:center;gap:5px;font-size:10px;color:#444;}
.b-line{width:20px;height:0;border-top:2px dashed;}
.c-wrap{display:flex;gap:8px;align-items:flex-start;}
.c-imgs{flex:1;display:flex;flex-direction:column;gap:4px;}
.c-imgbox{position:relative;}
.c-imgbox img{width:100%;display:block;border-radius:6px;}
.c-lbl{position:absolute;top:5px;left:5px;padding:2px 7px;border-radius:3px;font-size:10px;font-weight:700;}
.c-arrow{text-align:center;font-size:16px;color:#2e7d52;font-weight:700;line-height:1.6;}
.c-panel{width:108px;flex-shrink:0;display:flex;flex-direction:column;gap:6px;padding-top:2px;}
.c-item{background:#f6f6f6;border-radius:7px;padding:7px 8px;border-left:3px solid;}
.c-icon{font-size:13px;font-weight:700;line-height:1;}
.c-title{font-size:9px;font-weight:700;margin-top:1px;line-height:1.3;}
.c-detail{font-size:8px;color:#777;margin-top:2px;line-height:1.4;}
.d-wrap{display:flex;gap:5px;align-items:stretch;}
.d-side{flex:1;display:flex;flex-direction:column;}
.d-side-lbl{text-align:center;padding:5px 4px;font-size:11px;font-weight:700;border-radius:5px 5px 0 0;}
.d-side img{width:100%;display:block;border-radius:0 0 5px 5px;}
.d-mid{width:62px;flex-shrink:0;background:#111;border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 4px;}
.d-ttl{font-size:8px;color:#888;text-align:center;line-height:1.4;margin-bottom:5px;}
.d-item{text-align:center;padding:4px 0;}
.d-txt{font-size:9px;color:#fff;line-height:1.4;}
.d-badge{display:inline-block;font-size:8px;font-weight:700;padding:1px 5px;border-radius:3px;margin-top:2px;}
.d-sep{width:80%;height:1px;background:#2a2a2a;margin:2px auto;}
.bg{background:#2e7d52;color:#fff;}
.bi{background:#1565c0;color:#fff;}
</style>
</head>
<body>
<h1>ビフォーアフター 4フォーマット比較</h1>
<div class="tabs">
  <button class="tab on" id="t1" onclick="load('male')">サンプル① 男性</button>
  <button class="tab" id="t2" onclick="load('female')">サンプル② 女性</button>
</div>
<div class="grid">
  <div class="card">
    <div class="head" style="background:#333"><h2>A — 現在の横並び</h2><p>シンプル。変化の視認性は低め。</p></div>
    <div class="body">
      <div class="a-top"><span class="lbl lb">ビフォー</span><span class="lbl la">アフター</span></div>
      <img id="a-img" src="" alt="">
    </div>
  </div>
  <div class="card">
    <div class="head" style="background:#1a3a2a"><h2>B — ガイドライン付き ★ SNS向け</h2><p>目視実測で耳・肩の位置に正確に破線を配置。</p></div>
    <div class="body">
      <div class="b-row">
        <div class="b-col">
          <div class="b-lbl lb">ビフォー</div>
          <div class="b-imgwrap">
            <img id="b-bi" src="" alt="">
            <div class="gl" id="bgl-ear" style="background:#2563eb"></div>
            <div class="gl-tag" id="btag-ear" style="background:#2563eb;color:#fff">耳</div>
            <div class="gl" id="bgl-sho" style="background:#ea580c"></div>
            <div class="gl-tag" id="btag-sho" style="background:#ea580c;color:#fff">肩</div>
          </div>
        </div>
        <div class="b-mid"></div>
        <div class="b-col">
          <div class="b-lbl la">アフター</div>
          <div class="b-imgwrap">
            <img id="b-ai" src="" alt="">
            <div class="gl" id="agl-ear" style="background:#16a34a"></div>
            <div class="gl-tag" id="atag-ear" style="background:#16a34a;color:#fff">耳</div>
            <div class="gl" id="agl-sho" style="background:#b91c1c"></div>
            <div class="gl-tag" id="atag-sho" style="background:#b91c1c;color:#fff">肩</div>
          </div>
        </div>
      </div>
      <div class="b-legend">
        <div class="b-li"><div class="b-line" style="border-color:#2563eb"></div>耳の位置</div>
        <div class="b-li"><div class="b-line" style="border-color:#ea580c"></div>肩の高さ</div>
      </div>
    </div>
  </div>
  <div class="card">
    <div class="head" style="background:#0c2340"><h2>C — 縦並び＋定性評価 ★ カルテ向け</h2><p>画像から読み取った変化ポイントを明示。</p></div>
    <div class="body">
      <div class="c-wrap">
        <div class="c-imgs">
          <div class="c-imgbox"><img id="c-bi" src="" alt=""><span class="c-lbl lb">ビフォー</span></div>
          <div class="c-arrow">↓</div>
          <div class="c-imgbox"><img id="c-ai" src="" alt=""><span class="c-lbl la">アフター</span></div>
        </div>
        <div class="c-panel" id="c-panel"></div>
      </div>
    </div>
  </div>
  <div class="card">
    <div class="head" style="background:#2e1a00"><h2>D — 3分割レイアウト ★ LINE向け</h2><p>中央に変化ポイントを明示。患者さん送信に最適。</p></div>
    <div class="body">
      <div class="d-wrap">
        <div class="d-side"><div class="d-side-lbl lb">ビフォー</div><img id="d-bi" src="" alt=""></div>
        <div class="d-mid" id="d-mid"></div>
        <div class="d-side"><div class="d-side-lbl la">アフター</div><img id="d-ai" src="" alt=""></div>
      </div>
    </div>
  </div>
</div>

  male:   { before: { ear: 38.1, sho: 47.3 }, after: { ear: 38.1, sho: 47.3 } },
  female: { before: { ear: 40.7, sho: 51.2 }, after: { ear: 42.0, sho: 51.2 } }
};

var EVAL = {
  male: {
    c: [
      { color:'#2e7d52', icon:'✓', title:'頭部前方位 改善', detail:'耳が肩の直上に近づき<br>頸椎が整った' },
      { color:'#1565c0', icon:'✓', title:'胸椎後弾 改善',   detail:'背中の丸みが軽減し<br>胸が開いた' },
      { color:'#b45309', icon:'↑', title:'体幹・重心 整正', detail:'自然な重心線に<br>近づいた' }
    ],
    d: [
      { txt:'頭部前方位<br>改善', cls:'bg', sym:'✓' },
      { txt:'胸椎後弾<br>改善',       cls:'bg', sym:'✓' },
      { txt:'重心<br>整正',                   cls:'bi', sym:'↑' }
    ]
  },
  female: {
    c: [
      { color:'#2e7d52', icon:'✓', title:'腰椎過前彎 改善', detail:'反り腰が軽減し<br>脇柱が伸展した' },
      { color:'#1565c0', icon:'✓', title:'骨盤前傾 正常化', detail:'後方重心から<br>中立位へ改善' },
      { color:'#b45309', icon:'↑', title:'胸椎伸展 可動域拡大', detail:'施術後の反り動作で<br>大幅改善を確認' }
    ],
    d: [
      { txt:'腰椎過前彎<br>改善', cls:'bg', sym:'✓' },
      { txt:'骨盤前傾<br>正常化', cls:'bg', sym:'✓' },
      { txt:'胸椎伸展<br>拡大',       cls:'bi', sym:'↑' }
    ]
  }
};

var cache = {};

function load(key) {
  document.getElementById('t1').className = 'tab' + (key === 'male' ? ' on' : '');
  document.getElementById('t2').className = 'tab' + (key === 'female' ? ' on' : '');
  document.getElementById('a-img').src = SRC[key];

  var ev = EVAL[key];
  document.getElementById('c-panel').innerHTML = ev.c.map(function(x) {
    return '<div class="c-item" style="border-color:' + x.color + '">'
      + '<div class="c-icon" style="color:' + x.color + '">' + x.icon + '</div>'
      + '<div class="c-title" style="color:' + x.color + '">' + x.title + '</div>'
      + '<div class="c-detail">' + x.detail + '</div>'
      + '</div>';
  }).join('');

  document.getElementById('d-mid').innerHTML =
    '<div class="d-ttl">施術後<br>の変化</div>'
    + ev.d.map(function(x, i) {
      return (i > 0 ? '<div class="d-sep"></div>' : '')
        + '<div class="d-item"><div class="d-txt">' + x.txt + '</div>'
        + '<div class="d-badge ' + x.cls + '">' + x.sym + '</div></div>';
    }).join('');

  if (cache[key]) {
    applyHalves(key, cache[key].b, cache[key].a);
  } else {
    var img = new Image();
    img.onload = function() {
      var hw = Math.floor(img.width / 2), ih = img.height;
      var cb = document.createElement('canvas'); cb.width = hw; cb.height = ih;
      cb.getContext('2d').drawImage(img, 0, 0, hw, ih, 0, 0, hw, ih);
      var ca = document.createElement('canvas'); ca.width = hw; ca.height = ih;
      ca.getContext('2d').drawImage(img, hw, 0, hw, ih, 0, 0, hw, ih);
      var bUrl = cb.toDataURL('image/jpeg', 0.92);
      var aUrl = ca.toDataURL('image/jpeg', 0.92);
      cache[key] = { b: bUrl, a: aUrl };
      applyHalves(key, bUrl, aUrl);
    };
    img.src = SRC[key];
  }
}

function applyHalves(key, bUrl, aUrl) {
  ['b-bi', 'c-bi', 'd-bi'].forEach(function(id) { document.getElementById(id).src = bUrl; });
  ['b-ai', 'c-ai', 'd-ai'].forEach(function(id) { document.getElementById(id).src = aUrl; });
  var gl = GL[key];
  setLine('bgl-ear', 'btag-ear', gl.before.ear);
  setLine('bgl-sho', 'btag-sho', gl.before.sho);
  setLine('agl-ear', 'atag-ear', gl.after.ear);
  setLine('agl-sho', 'atag-sho', gl.after.sho);
}

function setLine(lineId, tagId, pct) {
  var el = document.getElementById(lineId);
  var tg = document.getElementById(tagId);
  if (el) el.style.top = pct + '%';
  if (tg) tg.style.top = pct + '%';
}

load('male');
